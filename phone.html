<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEEM TV - Phone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{ --purple2:#C084FC; --purple4:#5B21B6; --line:#e5e7eb; --ink:#111827; --ink2:#374151; --muted:#6b7280; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Cairo",system-ui;background:#fff;color:var(--ink)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 8px;position:sticky;top:0;background:#fff;border-bottom:1px solid #f2f2f2}
    .link{border:0;background:transparent;cursor:pointer;font-weight:900;color:var(--ink2);padding:8px 10px;border-radius:10px;text-decoration:none}
    .brand{font-weight:900;font-size:20px}
    .page{width:min(560px,92vw);margin:0 auto;padding:22px 0 120px}
    .step{color:var(--muted);font-weight:900;font-size:13px;text-align:center;margin-top:6px}
    .title{text-align:center;font-size:34px;line-height:1.2;font-weight:900;margin:14px 0 10px}
    .desc{text-align:center;color:var(--ink2);margin:0 auto 22px;line-height:1.8}
    .input{width:100%;padding:16px 14px;border:1px solid var(--line);border-radius:14px;font-size:16px;outline:none}
    .input:focus{border-color:rgba(139,92,246,.55);box-shadow:0 0 0 4px rgba(139,92,246,.12)}
    .field{margin:12px 0 18px}
    .footer-sticky{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,.85));border-top:1px solid var(--line);padding:12px 16px 18px}
    .inner{width:min(560px,92vw);margin:0 auto}
    .btn{width:100%;padding:18px;border:0;border-radius:999px;font-weight:900;font-size:18px;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--purple2),var(--purple4));box-shadow:0 20px 55px rgba(139,92,246,.25)}
    .btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="link" href="join.html">رجوع</a>
    <div class="brand">MEEM TV</div>
    <button class="link" onclick="alert('تسجيل الدخول لاحقاً')">دخول</button>
  </div>

  <div class="page">
    <div class="step">الخطوة 1 من 3</div>
    <div class="title">ما هو رقم هاتفك؟</div>
    <div class="desc">سنرسل كود تحقق برسالة SMS لإنشاء حسابك.</div>

    <div class="field">
      <input id="phone" class="input" inputmode="tel" placeholder="رقم الهاتف" />
    </div>
  </div>

  <div class="footer-sticky">
    <div class="inner">
      <button id="next" class="btn" disabled>متابعة</button>
    </div>
  </div>

  <script>
    const phone = document.getElementById('phone');
    const next = document.getElementById('next');

    function cleanPhone(v){ return (v||'').replace(/[^\d+]/g,'').trim(); }

    // preload if exists
    try{
      const saved = localStorage.getItem('meem_phone');
      if(saved){ phone.value = saved; }
    }catch(e){}

    function validate(){
      const v = cleanPhone(phone.value);
      const digits = v.replace(/[^\d]/g,'');
      next.disabled = digits.length < 8;
    }

    phone.addEventListener('input', validate);
    validate();

    next.addEventListener('click', () => {
      const v = cleanPhone(phone.value);
      try{ localStorage.setItem('meem_phone', v); }catch(e){}
      window.location.href = 'otp.html';
    });
  </script>
</body>
</html>
