<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIWAY</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --purple2:#a855f7;
  --purple4:#3b0764;
  --bg:#0b0f16;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  transform:scale(1.05);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.80));
}

.topBar{
  position:absolute;
  top:25px;
  left:40px;
  right:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:5;
}

/* ===== Premium Logo Animation ===== */

.logoTop{
  position:relative;
  height:90px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.logoTop img{
  position:absolute;
  height:85px; /* نفس الحجم للعربي والانجليزي */
  width:auto;
  opacity:0;
  transform:translateY(20px) scale(0.95);
  transition:all 1s cubic-bezier(.19,1,.22,1);
  filter: drop-shadow(0 0 22px rgba(168,85,247,.45));
}

.logoTop img.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* ================= CONTENT ================= */

.content{
  position:relative;
  z-index:2;
  max-width:750px;
}

h1{
  font-size:clamp(34px,5vw,52px);
  font-weight:900;
  margin:0;
}

</style>
</head>

<body>

<section class="hero">
  <div class="topBar">

    <div class="logoTop">
      <img class="logo logo-ar active"
           src="https://image2url.com/r2/default/images/1772135007677-7f7fd4b7-f200-4984-9f3b-a81d51cf2361.png"
           alt="RIWAY عربي">

      <img class="logo logo-en"
           src="https://image2url.com/r2/default/images/1772139329030-82b504d7-43a0-4a45-89ed-4de73b26fab4.png"
           alt="RIWAY English">
    </div>

  </div>

  <div class="content">
    <h1>كل الترفيه اللي بدك ياه</h1>
  </div>
</section>

<script>
const logoAr = document.querySelector(".logo-ar");
const logoEn = document.querySelector(".logo-en");

const AR_DURATION = 7000;  // العربي أطول
const EN_DURATION = 3000;  // الإنجليزي أقصر

function showArabic(){
  logoEn.classList.remove("active");
  logoAr.classList.add("active");
  setTimeout(showEnglish, AR_DURATION);
}

function showEnglish(){
  logoAr.classList.remove("active");
  logoEn.classList.add("active");
  setTimeout(showArabic, EN_DURATION);
}

showArabic();
</script>

</body>
</html>
