<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIWAY</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple4:#3b0764;
  --bg:#0b0f16;
  --bg2:#0f1520;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  transform:scale(1.05);
  z-index:0;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.80));
  z-index:0;
}

/* ================= TOP BAR ================= */

.topBar{
  position:absolute;
  top:40px;
  left:60px;
  right:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:50; /* فوق كل شيء */
}

/* ===== Logo ===== */

.logoTop{
  position:relative;
  height:120px;
  display:flex;
  align-items:center;
}

.logoTop img{
  position:absolute;
  height:105px;
  width:auto;
  opacity:0;
  transform:translateY(30px) scale(.96);
  transition:all 1s cubic-bezier(.19,1,.22,1);
  filter: drop-shadow(0 0 28px rgba(168,85,247,.55));
}

.logoTop img.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* ===== Login Button ===== */

.loginBtn a{
  text-decoration:none;
  font-weight:800;
  font-size:14px;
  color:#fff;
  padding:12px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(8px);
  transition:.3s;
}

.loginBtn a:hover{
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  border-color:transparent;
}

/* ================= HERO CONTENT ================= */

.content{
  position:relative;
  z-index:10;
  max-width:780px;
}

h1{
  font-size:clamp(34px,5vw,52px);
  font-weight:900;
  margin:0;
}

.highlight{
  margin-top:18px;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:28px;
  font-size:18px;
  line-height:1.8;
  color:rgba(255,255,255,.9);
}

.cta{
  margin-top:45px;
}

.cta a{
  display:inline-block;
  padding:18px 44px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.45);
}

/* ================= IMAGE SECTION ================= */

.contentImage{
  padding:80px 20px;
  background:var(--bg2);
  text-align:center;
}

.contentImage img{
  width:85%;
  max-width:900px;
  display:block;
  margin:0 auto;
}

/* ================= PRICING ================= */

.pricing{
  background:var(--bg);
  padding:90px 20px;
}

.planGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
  max-width:900px;
  margin:0 auto;
}

.plan{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:25px;
  padding:40px;
  text-align:center;
  transition:.3s;
}

.plan:hover{
  transform:translateY(-8px);
  border-color:var(--purple2);
}

.plan--featured{
  border:2px solid var(--purple2);
  box-shadow:0 30px 70px rgba(124,58,237,.3);
}

.plan h3{
  font-size:22px;
}

.plan h2{
  font-size:40px;
  margin:10px 0 20px;
}

.planBtn{
  margin-top:25px;
  display:inline-block;
  padding:14px 28px;
  border-radius:999px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
}

@media (max-width:900px){
  .planGrid{ grid-template-columns:1fr; }
  .logoTop img{ height:80px; }
}
</style>
</head>

<body>

<section class="hero">
  <div class="topBar">

    <div class="logoTop">
      <img class="logo logo-ar active"
           src="https://image2url.com/r2/default/images/1772135007677-7f7fd4b7-f200-4984-9f3b-a81d51cf2361.png">
      <img class="logo logo-en"
           src="https://image2url.com/r2/default/images/1772139329030-82b504d7-43a0-4a45-89ed-4de73b26fab4.png">
    </div>

    <div class="loginBtn">
      <a href="#">تسجيل الدخول</a>
    </div>

  </div>

  <div class="content">
    <h1>كل الترفيه اللي بدك ياه</h1>
    <div class="highlight">جرب مجاناً لمدة 24 ساعة</div>
    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
    </div>
    <div class="cta">
      <a href="#pricing">ابدأ التجربة المجانية</a>
    </div>
  </div>
</section>

<section class="contentImage">
  <img src="https://image2url.com/r2/default/images/1772144954428-7efde126-b016-44bb-ad5f-976b704d9cbf.png">
</section>

<section class="pricing" id="pricing">
  <div class="planGrid">

    <div class="plan">
      <h3>تجربة مجانية</h3>
      <h2>₪0 / 24 ساعة</h2>
      <a class="planBtn" href="#">ابدأ الآن</a>
    </div>

    <div class="plan plan--featured">
      <h3>اشتراك شهري</h3>
      <h2>₪25 / شهر</h2>
      <a class="planBtn" href="#">اشترك الآن</a>
    </div>

  </div>
</section>

<script>
const logoAr = document.querySelector(".logo-ar");
const logoEn = document.querySelector(".logo-en");

const AR_DURATION = 7000;
const EN_DURATION = 3000;

function showArabic(){
  logoEn.classList.remove("active");
  logoAr.classList.add("active");
  setTimeout(showEnglish, AR_DURATION);
}

function showEnglish(){
  logoAr.classList.remove("active");
  logoEn.classList.add("active");
  setTimeout(showArabic, EN_DURATION);
}

showArabic();
</script>

</body>
</html>
