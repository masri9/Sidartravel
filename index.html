<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
  --bg:#0b0f16;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  transform:scale(1.05);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.80));
}

/* ================= TOP BAR ================= */

.topBar{
  position:absolute;
  top:25px;
  left:40px;
  right:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:5;
}

/* ===== Logo Animation ===== */

.logoTop{
  position:relative;
  height:78px;
  display:flex;
  align-items:center;
}

.logoTop .logo{
  position:absolute;
  height:70px;
  width:auto;
  opacity:0;
  transition:opacity .7s ease-in-out, transform .7s ease-in-out;
  transform:translateY(2px) scale(.985);
  filter: drop-shadow(0 0 18px rgba(168,85,247,.5));
}

.logoTop .logo.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

.loginBtn a{
  text-decoration:none;
  font-weight:800;
  font-size:14px;
  color:#fff;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
}

.loginBtn a:hover{
  background:rgba(255,255,255,.1);
}

/* ================= HERO CONTENT ================= */

.content{
  position:relative;
  z-index:2;
  max-width:750px;
}

h1{
  font-size:clamp(34px,5vw,52px);
  font-weight:900;
  margin:0;
  line-height:1.2;
}

.highlight{
  margin-top:18px;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:28px;
  font-size:18px;
  line-height:1.8;
  color:rgba(255,255,255,.9);
}

.cta{
  margin-top:45px;
}

.cta a{
  display:inline-block;
  padding:18px 44px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.45);
  transition:.25s;
}

.cta a:hover{
  transform:translateY(-4px);
}

.fine{
  margin-top:18px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}
</style>
</head>

<body>

<section class="hero">
  <div class="topBar">
    <div class="logoTop">
      <img class="logo logo-ar active"
           src="https://image2url.com/r2/default/images/1772135007677-7f7fd4b7-f200-4984-9f3b-a81d51cf2361.png"
           alt="RIWAY عربي">
      <img class="logo logo-en"
           src="https://image2url.com/r2/default/images/1772139329030-82b504d7-43a0-4a45-89ed-4de73b26fab4.png"
           alt="RIWAY English">
    </div>

    <div class="loginBtn"><a href="#">تسجيل الدخول</a></div>
  </div>

  <div class="content">
    <h1>كل الترفيه اللي بدك ياه</h1>
    <div class="highlight">شهر مجاني لأول مرة</div>
    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
      وتجربة مشاهدة احترافية على الهاتف والتلفاز.
    </div>
    <div class="cta">
      <a href="#">ابدأ الشهر المجاني</a>
    </div>
    <div class="fine">إلغاء في أي وقت • بدون التزام</div>
  </div>
</section>

<script>
/* ===== Logo Switch (Arabic longer) ===== */
const logoAr = document.querySelector(".logo-ar");
const logoEn = document.querySelector(".logo-en");

const AR_DURATION = 6000;
const EN_DURATION = 2500;

function showArabic(){
  logoEn.classList.remove("active");
  logoAr.classList.add("active");
  setTimeout(showEnglish, AR_DURATION);
}

function showEnglish(){
  logoAr.classList.remove("active");
  logoEn.classList.add("active");
  setTimeout(showArabic, EN_DURATION);
}

showArabic();
</script>

</body>
</html>
