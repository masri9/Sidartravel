<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MEEM TV</title>

<style>
:root{
  --bg:#0c0820;
  --purple1:#C084FC;   /* بنفسجي فاتح */
  --purple2:#8B5CF6;   /* بنفسجي متوسط */
  --purple3:#6D28D9;   /* بنفسجي أغمق */
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
  --muted2:rgba(255,255,255,.55);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Tahoma;
  background: var(--bg);
  color: var(--text);
}

/* HERO */
.hero{
  min-height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 20px 120px;
  overflow:hidden;
}

/* collage background */
.hero::before{
  content:"";
  position:absolute; inset:0;
  background:url("bg-collage.jpg") center/cover no-repeat;
  transform:scale(1.05);
  opacity:.85;
}

/* purple overlay */
.hero::after{
  content:"";
  position:absolute; inset:0;
  background:
  linear-gradient(to bottom,
    rgba(12,8,32,.4),
    rgba(12,8,32,.9)
  );
}

/* content */
.wrap{
  position:relative;
  width:min(560px,92vw);
  text-align:center;
}

.logo{
  font-weight:900;
  font-size:20px;
  margin-bottom:20px;
  letter-spacing:.5px;
}

h1{
  font-size:clamp(32px,5vw,44px);
  line-height:1.1;
  margin:0 0 10px;
  font-weight:900;
}

.highlight{
  display:block;
  margin-top:12px;
  font-size:clamp(22px,3.5vw,30px);
  font-weight:900;
  color:var(--purple1);
  text-shadow:0 0 25px rgba(192,132,252,.4);
}

.sub{
  color:var(--muted);
  margin:15px 0 25px;
  font-size:15px;
  line-height:1.6;
}

/* CTA */
.cta button{
  width:100%;
  padding:18px;
  border:0;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(90deg,var(--purple1),var(--purple3));
  box-shadow:0 20px 45px rgba(139,92,246,.35);
  transition:.2s;
}
.cta button:hover{
  transform:translateY(-2px);
  box-shadow:0 25px 60px rgba(139,92,246,.45);
}

.fine{
  margin-top:12px;
  font-size:13px;
  color:var(--muted2);
}

/* features */
.features{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:30px;
}

.feat{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:14px;
  backdrop-filter:blur(6px);
}

.feat .t{
  font-weight:800;
  font-size:13px;
  margin-bottom:4px;
}

.feat .d{
  font-size:12px;
  color:var(--muted2);
}

@media(max-width:520px){
  .features{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<section class="hero">
  <div class="wrap">

    <div class="logo">MEEM TV</div>

    <h1>
      كل الترفيه اللي بدك ياه
      <span class="highlight">شهر مجاني لأول مرة</span>
    </h1>

    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية وتجربة احترافية.
    </div>

    <div class="cta">
      <button>ابدأ الشهر المجاني</button>
    </div>

    <div class="fine">إلغاء في أي وقت • بدون التزام</div>

    <div class="features">
      <div class="feat">
        <div class="t">قنوات مباشرة</div>
        <div class="d">رياضة + أخبار + ترفيه</div>
      </div>
      <div class="feat">
        <div class="t">مكتبة أفلام</div>
        <div class="d">أحدث الإصدارات</div>
      </div>
      <div class="feat">
        <div class="t">اشتراك شهري</div>
        <div class="d">سريع وآمن</div>
      </div>
    </div>

  </div>
</section>

</body>
</html>
