<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
  --bg:#0b0f16;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  transform:scale(1.05);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.80));
}

/* ================= TOP BAR ================= */

.topBar{
  position:absolute;
  top:25px;
  left:40px;
  right:40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:5;
}

.logoTop{
  font-weight:900;
  font-size:20px;
}

.loginBtn a{
  text-decoration:none;
  font-weight:800;
  font-size:14px;
  color:#fff;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
}

/* ================= HERO CONTENT ================= */

.content{
  position:relative;
  z-index:2;
  max-width:750px;
}

h1{
  font-size:clamp(34px,5vw,52px);
  font-weight:900;
  margin:0;
  line-height:1.2;
}

.highlight{
  margin-top:18px;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:28px;
  font-size:18px;
  line-height:1.8;
  color:rgba(255,255,255,.9);
}

.cta{
  margin-top:45px;
}

.cta a{
  display:inline-block;
  padding:18px 44px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.45);
}

.fine{
  margin-top:18px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}

/* ================= CHANNELS SECTION ================= */

.channelsFull{
  position:relative;
  width:100%;
  height:100vh;
  background-image:url("https://images.unsplash.com/photo-1593784991095-a205069470b6?q=80&w=2000&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  display:flex;
  align-items:center;
  justify-content:center;
}

.channelsFull::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.85));
}

.channelsOverlay{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:800px;
  padding:20px;
}

.channelsOverlay h2{
  font-size:clamp(34px,5vw,55px);
  font-weight:900;
  margin-bottom:20px;
}

.channelsOverlay p{
  font-size:20px;
  color:rgba(255,255,255,.85);
}

</style>
</head>

<body>

<section class="hero">
  <div class="topBar">
    <div class="logoTop">MEEM TV</div>
    <div class="loginBtn">
      <a href="#">تسجيل الدخول</a>
    </div>
  </div>

  <div class="content">
    <h1>كل الترفيه اللي بدك ياه</h1>
    <div class="highlight">شهر مجاني لأول مرة</div>
    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
      وتجربة مشاهدة احترافية على الهاتف والتلفاز.
    </div>
    <div class="cta">
      <a href="#">ابدأ الشهر المجاني</a>
    </div>
    <div class="fine">
      إلغاء في أي وقت • بدون التزام
    </div>
  </div>
</section>

<section class="channelsFull">
  <div class="channelsOverlay">
    <h2>لا تفوّت أي مباراة بعد اليوم</h2>
    <p>بث مباشر بدون تقطيع • كل البطولات • جودة فائقة HD & 4K</p>
  </div>
</section>

</body>
</html>
