<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIWAY</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple4:#3b0764;
  --bg:#0b0f16;
  --bg2:#0f1520;
  --gold1:#f6e7b2;
  --gold2:#d6b25e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 70px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/27/daUauQwIzYKsMChEXJDG/image.png");
  background-size:cover;
  background-position:center;
  transform:scale(1.06);
  filter:saturate(1.05) contrast(1.05);
  z-index:0;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 15%, rgba(168,85,247,.22), transparent 55%),
    linear-gradient(to bottom, rgba(0,0,0,.40), rgba(0,0,0,.85));
  z-index:1;
}

/* ===== TOP BAR ===== */

.topBar{
  position:absolute;
  top:22px;
  left:22px;
  right:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px;
  border-radius:18px;
  background:rgba(15,21,32,.25);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(10px);
  z-index:60;
}

.logoTop{
  position:relative;
  height:86px;
  display:flex;
  align-items:center;
}

.logoTop img{
  position:absolute;
  height:78px;
  opacity:0;
  transform:translateY(18px) scale(.98);
  transition:all 1s cubic-bezier(.19,1,.22,1);
  filter: drop-shadow(0 0 28px rgba(168,85,247,.55));
}

.logoTop img.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

.loginBtn a{
  text-decoration:none;
  font-weight:900;
  font-size:14px;
  color:#fff;
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.10);
  transition:.25s;
}

.loginBtn a:hover{
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  border-color:transparent;
}

/* ===== HERO CONTENT ===== */

.content{
  position:relative;
  z-index:10;
  max-width:860px;
}

.heroKicker{
  font-family:"Scheherazade New", serif;
  font-size:22px;
  margin-bottom:14px;
}

.hero h1{
  font-family:"Amiri", serif;
  font-size:clamp(36px,5.4vw,58px);
  font-weight:700;
  margin:0;
  line-height:1.2;
  text-shadow:0 18px 40px rgba(0,0,0,.65);
}

.highlight{
  margin-top:18px;
  font-size:clamp(18px,2.6vw,26px);
  font-weight:900;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:22px;
  font-size:18px;
  line-height:1.9;
  color:rgba(255,255,255,.92);
}

.cta{
  margin-top:38px;
}

.cta a{
  display:inline-block;
  padding:16px 40px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.45);
}

/* ================= AFTER HERO ================= */

.afterHero{
  background:linear-gradient(180deg, rgba(15,21,32,1) 0%, rgba(11,15,22,1) 100%);
  padding:90px 20px;
}

/* ===== Poster Strip ===== */

.posterStrip{
  margin:70px auto 0;
  max-width:1100px;
}

.stripHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.stripHead h2{
  margin:0;
  font-size:26px;
  font-weight:900;
}

.strip{
  display:flex;
  gap:14px;
  overflow:auto;
  padding-bottom:10px;
}

.poster{
  width:165px;
  height:235px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  position:relative;
  transition:.3s;
}

.poster:hover{
  transform:translateY(-6px);
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== Responsive ===== */

@media (max-width:720px){
  .logoTop img{ height:60px; }
  .poster{ width:140px; height:200px; }
}

</style>
</head>

<body>

<section class="hero">

  <div class="topBar">
    <div class="logoTop">
      <img class="logo-ar active" src="https://image2url.com/r2/default/images/1772135007677-7f7fd4b7-f200-4984-9f3b-a81d51cf2361.png">
      <img class="logo-en" src="https://image2url.com/r2/default/images/1772139329030-82b504d7-43a0-4a45-89ed-4de73b26fab4.png">
    </div>
    <div class="loginBtn">
      <a href="#">تسجيل الدخول</a>
    </div>
  </div>

  <div class="content">
    <div class="heroKicker">رِواي — بين الماضي والحاضر</div>
    <h1>كل الترفيه اللي بدك ياه</h1>
    <div class="highlight">جرب مجاناً لمدة 24 ساعة</div>
    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
    </div>
    <div class="cta">
      <a href="#about">اكتشف رواي</a>
    </div>
  </div>

</section>

<section class="afterHero" id="about">

  <div class="posterStrip">
    <div class="stripHead">
      <h2>لمحات من المحتوى</h2>
    </div>

    <div class="strip">
      <div class="poster"><img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=900&q=60"></div>
      <div class="poster"><img src="https://images.unsplash.com/photo-1549893074-7baf566750d7?auto=format&fit=crop&w=900&q=60"></div>
      <div class="poster"><img src="https://images.unsplash.com/photo-1548013146-72479768bada?auto=format&fit=crop&w=900&q=60"></div>
      <div class="poster"><img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=900&q=60"></div>
    </div>
  </div>

</section>

<script>
const logoAr = document.querySelector(".logo-ar");
const logoEn = document.querySelector(".logo-en");

const AR_DURATION = 7000;
const EN_DURATION = 3000;

function showArabic(){
  logoEn.classList.remove("active");
  logoAr.classList.add("active");
  setTimeout(showEnglish, AR_DURATION);
}

function showEnglish(){
  logoAr.classList.remove("active");
  logoEn.classList.add("active");
  setTimeout(showArabic, EN_DURATION);
}

showArabic();
</script>

</body>
</html>
