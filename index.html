<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:#0b061f;
  overflow:hidden;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

/* الشبكة المائلة */
.movies-bg{
  position:absolute;
  width:140%;
  height:140%;
  top:-20%;
  left:-20%;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:12px;
  transform:rotate(-18deg);
}

.movies-bg img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  filter:brightness(.65);
}

/* الطبقة البنفسجية */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(124,58,237,.5), rgba(20,0,50,.95)),
    linear-gradient(to bottom, rgba(40,0,80,.6), rgba(10,0,30,.95));
  z-index:1;
}

/* المحتوى */
.hero-content{
  position:relative;
  z-index:2;
  max-width:750px;
  color:#fff;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:900;
  margin-bottom:30px;
  letter-spacing:1px;
}

.hero-content h1{
  font-size:clamp(34px,5vw,56px);
  font-weight:900;
  line-height:1.2;
  margin:0;
}

.highlight{
  margin-top:18px;
  font-size:26px;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
}

.sub{
  margin-top:25px;
  font-size:18px;
  color:rgba(255,255,255,.85);
  line-height:1.8;
}

/* زر */
.cta{
  margin-top:40px;
}

.cta a{
  display:inline-block;
  padding:22px 70px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 30px 70px rgba(124,58,237,.5);
  transition:.3s;
}

.cta a:hover{
  transform:translateY(-4px);
  box-shadow:0 40px 90px rgba(124,58,237,.7);
}

.fine{
  margin-top:18px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}

@media(max-width:768px){
  .movies-bg{
    grid-template-columns:repeat(5,1fr);
  }
}

</style>
</head>

<body>

<section class="hero">

  <!-- خلفية البوسترات -->
  <div class="movies-bg">
    <img src="movies/1.jpg">
    <img src="movies/2.jpg">
    <img src="movies/3.jpg">
    <img src="movies/4.jpg">
    <img src="movies/5.jpg">
    <img src="movies/6.jpg">
    <img src="movies/7.jpg">
    <img src="movies/8.jpg">
    <img src="movies/9.jpg">
    <img src="movies/10.jpg">
    <img src="movies/11.jpg">
    <img src="movies/12.jpg">
    <img src="movies/13.jpg">
    <img src="movies/14.jpg">
    <img src="movies/15.jpg">
    <img src="movies/16.jpg">
  </div>

  <!-- النص -->
  <div class="hero-content">
    <div class="logo">MEEM TV</div>

    <h1>كل الترفيه اللي بدك ياه</h1>

    <div class="highlight">شهر مجاني لأول مرة</div>

    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
      وتجربة مشاهدة احترافية على الهاتف والتلفاز.
    </div>

    <div class="cta">
      <a href="join.html">ابدأ الشهر المجاني</a>
    </div>

    <div class="fine">
      إلغاء في أي وقت • بدون التزام
    </div>
  </div>

</section>

</body>
</html>
