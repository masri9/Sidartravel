<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:linear-gradient(180deg,#140033,#1c003f 60%,#1a0035);
  color:#fff;
}

/* الجزء العلوي - الصورة */
.top-image{
  position:relative;
  height:40vh; /* غيرها إذا بدك أصغر أو أكبر */
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  overflow:hidden;
}

/* طبقة بنفسجية احترافية */
.top-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(139,92,246,.55), rgba(20,0,50,.95)),
    linear-gradient(to bottom, rgba(40,0,80,.6), rgba(10,0,30,.98));
}

/* المحتوى */
.content{
  padding:50px 20px 90px;
  text-align:center;
  max-width:750px;
  margin:auto;
}

.logo{
  font-weight:900;
  font-size:22px;
  margin-bottom:25px;
  letter-spacing:1px;
}

h1{
  font-size:clamp(32px,5vw,50px);
  font-weight:900;
  line-height:1.2;
  margin:0;
}

.highlight{
  margin-top:18px;
  font-size:24px;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
}

.sub{
  margin-top:28px;
  font-size:18px;
  color:rgba(255,255,255,.85);
  line-height:1.8;
}

/* زر */
.cta{
  margin-top:40px;
}

.cta a{
  display:inline-block;
  padding:20px 70px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 30px 70px rgba(124,58,237,.45);
  transition:.3s;
}

.cta a:hover{
  transform:translateY(-4px);
  box-shadow:0 40px 90px rgba(124,58,237,.65);
}

.fine{
  margin-top:18px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}

/* موبايل */
@media(max-width:768px){
  .top-image{
    height:35vh;
  }
}

</style>
</head>

<body>

<!-- الصورة بالأعلى -->
<section class="top-image"></section>

<!-- النص تحتها -->
<section class="content">

  <div class="logo">MEEM TV</div>

  <h1>كل الترفيه اللي بدك ياه</h1>

  <div class="highlight">شهر مجاني لأول مرة</div>

  <div class="sub">
    قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
    وتجربة مشاهدة احترافية على الهاتف والتلفاز.
  </div>

  <div class="cta">
    <a href="join.html">ابدأ الشهر المجاني</a>
  </div>

  <div class="fine">
    إلغاء في أي وقت • بدون التزام
  </div>

</section>

</body>
</html>
