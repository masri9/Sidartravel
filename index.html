<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIWAY</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple4:#3b0764;
  --bg:#0b0f16;
  --gold1:#f6e7b2;
  --gold2:#d6b25e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* ================= HERO ================= */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 70px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://image2url.com/r2/default/images/1772219084017-64564e84-0225-4443-8581-0fe72d5ffd02.blob");
  background-size:cover;
  background-position:center;
  transform:scale(1.06);
  filter:saturate(1.05) contrast(1.05);
  z-index:0;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 15%, rgba(168,85,247,.22), transparent 55%),
    linear-gradient(to bottom, rgba(0,0,0,.40), rgba(0,0,0,.85));
  z-index:1;
}

/* ===== TOP BAR (بدون إطار) ===== */

.topBar{
  position:absolute;
  top:30px;
  left:60px;
  right:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:60;
}

/* ===== Logo ===== */

.logoTop{
  position:relative;
  height:90px;
  display:flex;
  align-items:center;
}

.logoTop img{
  position:absolute;
  height:85px;
  opacity:0;
  transform:translateY(18px) scale(.98);
  transition:all 1s cubic-bezier(.19,1,.22,1);
  filter: drop-shadow(0 0 28px rgba(168,85,247,.65));
}

.logoTop img.active{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* ===== Login Button ===== */

.loginBtn a{
  text-decoration:none;
  font-weight:900;
  font-size:15px;
  color:#fff;
  padding:12px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(6px);
  transition:.3s;
}

.loginBtn a:hover{
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  border-color:transparent;
  transform:translateY(-2px);
}

/* ===== HERO CONTENT ===== */

.content{
  position:relative;
  z-index:10;
  max-width:860px;
}

.heroKicker{
  font-family:"Scheherazade New", serif;
  font-size:22px;
  margin-bottom:14px;
}

.hero h1{
  font-family:"Amiri", serif;
  font-size:clamp(36px,5.4vw,58px);
  font-weight:700;
  margin:0;
  line-height:1.2;
  text-shadow:0 18px 40px rgba(0,0,0,.65);
}

.highlight{
  margin-top:18px;
  font-size:clamp(18px,2.6vw,26px);
  font-weight:900;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:22px;
  font-size:18px;
  line-height:1.9;
  color:rgba(255,255,255,.92);
}

.cta{
  margin-top:38px;
}

.cta a{
  display:inline-block;
  padding:16px 40px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.45);
}

/* ===== Responsive ===== */

@media (max-width:720px){
  .topBar{
    left:20px;
    right:20px;
  }
  .logoTop img{ height:60px; }
}
</style>
</head>

<body>

<section class="hero">

  <div class="topBar">
    <div class="logoTop">
      <img class="logo-ar active" src="https://image2url.com/r2/default/images/1772135007677-7f7fd4b7-f200-4984-9f3b-a81d51cf2361.png">
      <img class="logo-en" src="https://image2url.com/r2/default/images/1772139329030-82b504d7-43a0-4a45-89ed-4de73b26fab4.png">
    </div>

    <div class="loginBtn">
      <a href="#">تسجيل الدخول</a>
    </div>
  </div>

  <div class="content">
    <div class="heroKicker">رِواي — بين الماضي والحاضر</div>
    <h1>كل الترفيه اللي بدك ياه</h1>
    <div class="highlight">جرب مجاناً لمدة 24 ساعة</div>
    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
    </div>
    <div class="cta">
      <a href="#about">اكتشف رواي</a>
    </div>
  </div>

</section>

<script>
const logoAr = document.querySelector(".logo-ar");
const logoEn = document.querySelector(".logo-en");

const AR_DURATION = 7000;
const EN_DURATION = 3000;

function showArabic(){
  logoEn.classList.remove("active");
  logoAr.classList.add("active");
  setTimeout(showEnglish, AR_DURATION);
}

function showEnglish(){
  logoAr.classList.remove("active");
  logoEn.classList.add("active");
  setTimeout(showArabic, EN_DURATION);
}

showArabic();
</script>

</body>
</html>
