<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:#140028;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

/* الخلفية */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://plain-eeur-prod-public.komododecks.com/202602/26/DS5JHAyGBmDJzW1ERH1Z/image.png");
  background-size:cover;
  background-position:center;
  filter:brightness(.95) contrast(1.1);
  transform:scale(1.05);
}

/* التعتيم الأسود فقط */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.75));
}

/* المحتوى */
.content{
  position:relative;
  z-index:2;
  max-width:750px;
}

.logo{
  font-weight:900;
  font-size:20px;
  margin-bottom:25px;
  letter-spacing:1px;
}

h1{
  font-size:clamp(34px,5vw,52px);
  font-weight:900;
  margin:0;
  line-height:1.2;
  text-shadow:0 10px 40px rgba(0,0,0,.7);
}

/* الجملة البنفسجية */
.highlight{
  margin-top:18px;
  font-size:26px;
  font-weight:900;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 5px 25px rgba(168,85,247,.6);
}

.sub{
  margin-top:28px;
  font-size:18px;
  line-height:1.8;
  color:rgba(255,255,255,.9);
  text-shadow:0 5px 25px rgba(0,0,0,.6);
}

/* الزر */
.cta{
  margin-top:45px;
}

.cta a{
  display:inline-block;
  padding:20px 70px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 30px 70px rgba(124,58,237,.45);
  transition:.3s;
}

.cta a:hover{
  transform:translateY(-4px);
  box-shadow:0 40px 90px rgba(124,58,237,.7);
}

.fine{
  margin-top:18px;
  font-size:14px;
  color:rgba(255,255,255,.65);
}

</style>
</head>

<body>

<section class="hero">
  <div class="content">

    <div class="logo">MEEM TV</div>

    <h1>كل الترفيه اللي بدك ياه</h1>

    <div class="highlight">شهر مجاني لأول مرة</div>

    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
      وتجربة مشاهدة احترافية على الهاتف والتلفاز.
    </div>

    <div class="cta">
      <a href="#">ابدأ الشهر المجاني</a>
    </div>

    <div class="fine">
      إلغاء في أي وقت • بدون التزام
    </div>

  </div>
</section>

</body>
</html> دقيقة اقلك شوذتعنل
