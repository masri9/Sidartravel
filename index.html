<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEEM TV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#3b0764;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo",sans-serif;
  background:linear-gradient(180deg,#140033,#1c003f 60%,#1a0035);
  color:#fff;
}

/* الجزء العلوي - الصورة */
.top-image{
  position:relative;
  height:35vh;   /* حجم الجزء العلوي */
  background-image:url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/f562aaf4-5dbb-4603-a32b-6ef6c2230136/dh0w8qv-9d8ee6b2-b41a-4681-ab9b-8a227560dc75.jpg/v1/fill/w_1280,h_720,q_75,strp/the_netflix_login_background__canada__2024___by_logofeveryt_dh0w8qv-fullview.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  overflow:hidden;
}

/* طبقة بنفسجية فوق الصورة */
.top-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(124,58,237,.45),
    rgba(20,0,50,.95)
  );
}

/* المحتوى */
.content{
  padding:40px 20px 80px;
  text-align:center;
  max-width:700px;
  margin:auto;
}

.logo{
  font-weight:900;
  font-size:22px;
  margin-bottom:20px;
}

h1{
  font-size:clamp(30px,5vw,48px);
  font-weight:900;
  line-height:1.2;
  margin:0;
}

.highlight{
  margin-top:15px;
  font-size:22px;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
}

.sub{
  margin-top:25px;
  font-size:17px;
  color:rgba(255,255,255,.85);
  line-height:1.8;
}

/* زر */
.cta{
  margin-top:35px;
}

.cta a{
  display:inline-block;
  padding:18px 60px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.4);
  transition:.3s;
}

.cta a:hover{
  transform:translateY(-4px);
  box-shadow:0 35px 80px rgba(124,58,237,.6);
}

.fine{
  margin-top:15px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}

</style>
</head>

<body>

<section class="top-image"></section>

<section class="content">

  <div class="logo">MEEM TV</div>

  <h1>كل الترفيه اللي بدك ياه</h1>

  <div class="highlight">شهر مجاني لأول مرة</div>

  <div class="sub">
    قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
    وتجربة مشاهدة احترافية على الهاتف والتلفاز.
  </div>

  <div class="cta">
    <a href="join.html">ابدأ الشهر المجاني</a>
  </div>

  <div class="fine">
    إلغاء في أي وقت • بدون التزام
  </div>

</section>

</body>
</html>
