<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MEEM TV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --purple1:#d8b4fe;
  --purple2:#a855f7;
  --purple3:#7c3aed;
  --purple4:#4c1d95;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Cairo", sans-serif;
  background:#0b061f;
  overflow-x:hidden;
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

/* شبكة الصور */
.movies-bg{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:20px;
  animation:slowZoom 30s ease-in-out infinite alternate;
}

@keyframes slowZoom{
  from{transform:scale(1.05)}
  to{transform:scale(1.15)}
}

.movies-bg img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:20px;
  filter:brightness(.6);
}

/* الطبقة البنفسجية */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(124,58,237,.55), rgba(20,0,50,.9)),
    linear-gradient(to bottom, rgba(30,0,70,.6), rgba(10,0,30,.95));
  z-index:1;
}

/* المحتوى */
.hero-content{
  position:relative;
  z-index:2;
  max-width:700px;
  color:#fff;
}

.logo{
  font-weight:900;
  font-size:22px;
  margin-bottom:25px;
  letter-spacing:1px;
}

.hero-content h1{
  font-size:clamp(32px,5vw,52px);
  font-weight:900;
  line-height:1.2;
  margin:0;
}

.highlight{
  margin-top:18px;
  font-size:24px;
  background:linear-gradient(90deg,var(--purple1),var(--purple2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
}

.sub{
  margin-top:25px;
  font-size:18px;
  color:rgba(255,255,255,.8);
  line-height:1.8;
}

/* زر الاشتراك */
.cta{
  margin-top:40px;
}

.cta a{
  display:inline-block;
  padding:20px 60px;
  border-radius:999px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(90deg,var(--purple2),var(--purple4));
  box-shadow:0 25px 60px rgba(124,58,237,.5);
  transition:.3s;
}

.cta a:hover{
  transform:translateY(-4px);
  box-shadow:0 35px 80px rgba(124,58,237,.7);
}

.fine{
  margin-top:20px;
  font-size:14px;
  color:rgba(255,255,255,.6);
}

@media(max-width:768px){
  .movies-bg{
    grid-template-columns:repeat(3,1fr);
  }
}

</style>
</head>

<body>

<section class="hero">

  <!-- خلفية صور -->
  <div class="movies-bg">
    <img src="movies/1.jpg">
    <img src="movies/2.jpg">
    <img src="movies/3.jpg">
    <img src="movies/4.jpg">
    <img src="movies/5.jpg">
    <img src="movies/6.jpg">
    <img src="movies/7.jpg">
    <img src="movies/8.jpg">
    <img src="movies/9.jpg">
    <img src="movies/10.jpg">
    <img src="movies/11.jpg">
    <img src="movies/12.jpg">
  </div>

  <!-- النص -->
  <div class="hero-content">

    <div class="logo">MEEM TV</div>

    <h1>
      كل الترفيه اللي بدك ياه
    </h1>

    <div class="highlight">
      شهر مجاني لأول مرة
    </div>

    <div class="sub">
      قنوات مباشرة، رياضة، أفلام ومسلسلات بجودة عالية
      وتجربة مشاهدة احترافية على الهاتف والتلفاز.
    </div>

    <div class="cta">
      <a href="join.html">ابدأ الشهر المجاني</a>
    </div>

    <div class="fine">
      إلغاء في أي وقت • بدون التزام
    </div>

  </div>

</section>

</body>
</html>
