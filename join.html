<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEEM TV - Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{ --purple2:#C084FC; --purple4:#5B21B6; --line:#e5e7eb; --ink:#111827; --ink2:#374151; --muted:#6b7280; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Cairo",system-ui;background:#fff;color:var(--ink)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 8px;position:sticky;top:0;background:#fff;border-bottom:1px solid #f2f2f2}
    .link{border:0;background:transparent;cursor:pointer;font-weight:900;color:var(--ink2);padding:8px 10px;border-radius:10px;text-decoration:none}
    .brand{font-weight:900;font-size:20px}
    .page{width:min(560px,92vw);margin:0 auto;padding:22px 0 120px}
    .step{color:var(--muted);font-weight:900;font-size:13px;text-align:center;margin-top:6px}
    .title{text-align:center;font-size:34px;line-height:1.2;font-weight:900;margin:14px 0 10px}
    .desc{text-align:center;color:var(--ink2);margin:0 auto 22px;line-height:1.8}
    .big-illus{width:100%;height:160px;border-radius:22px;background:linear-gradient(180deg,#f6f7ff,#fff);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin:10px auto 20px}
    .devices{display:flex;align-items:flex-end;gap:14px;opacity:.75}
    .dev{background:#f3f4f6;border:2px solid #e5e7eb;border-radius:12px}
    .dev.tv{width:170px;height:95px}.dev.lap{width:120px;height:70px}.dev.mob{width:45px;height:75px;border-radius:10px}
    .footer-sticky{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,.85));border-top:1px solid var(--line);padding:12px 16px 18px}
    .inner{width:min(560px,92vw);margin:0 auto}
    .btn{width:100%;padding:18px;border:0;border-radius:999px;font-weight:900;font-size:18px;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--purple2),var(--purple4));box-shadow:0 20px 55px rgba(139,92,246,.25);text-decoration:none;display:block;text-align:center}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="link" href="index.html">✕</a>
    <div class="brand">MEEM TV</div>
    <button class="link" onclick="alert('صفحة تسجيل الدخول لاحقاً')">دخول</button>
  </div>

  <div class="page">
    <div class="big-illus" aria-hidden="true">
      <div class="devices">
        <div class="dev lap"></div>
        <div class="dev mob"></div>
        <div class="dev tv"></div>
      </div>
    </div>

    <div class="step">الخطوة 1 من 3</div>
    <div class="title">الانضمام إلى خدمة MEEM TV</div>
    <div class="desc">ثلاث خطوات سريعة، ونبدأ المشاهدة فوراً.</div>
  </div>

  <div class="footer-sticky">
    <div class="inner">
      <a class="btn" href="phone.html">هيا نبدأ</a>
    </div>
  </div>
</body>
</html>
