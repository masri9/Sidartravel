<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEEM TV - OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{ --purple2:#C084FC; --purple4:#5B21B6; --line:#e5e7eb; --ink:#111827; --ink2:#374151; --muted:#6b7280; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Cairo",system-ui;background:#fff;color:var(--ink)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 18px 8px;position:sticky;top:0;background:#fff;border-bottom:1px solid #f2f2f2}
    .link{border:0;background:transparent;cursor:pointer;font-weight:900;color:var(--ink2);padding:8px 10px;border-radius:10px;text-decoration:none}
    .brand{font-weight:900;font-size:20px}
    .page{width:min(560px,92vw);margin:0 auto;padding:22px 0 120px}
    .step{color:var(--muted);font-weight:900;font-size:13px;text-align:center;margin-top:6px}
    .title{text-align:center;font-size:34px;line-height:1.2;font-weight:900;margin:14px 0 10px}
    .desc{text-align:center;color:var(--ink2);margin:0 auto 22px;line-height:1.8}
    .otp{display:flex;justify-content:center;gap:12px;direction:ltr;margin:18px 0 24px}
    .otp input{width:64px;height:64px;text-align:center;font-size:22px;font-weight:900;border:1px solid var(--line);border-radius:16px;outline:none}
    .otp input:focus{border-color:rgba(139,92,246,.55);box-shadow:0 0 0 4px rgba(139,92,246,.12)}
    .timer{text-align:center;color:var(--muted);font-weight:900;margin-top:10px}
    .footer-sticky{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top, rgba(255,255,255,1), rgba(255,255,255,.85));border-top:1px solid var(--line);padding:12px 16px 18px}
    .inner{width:min(560px,92vw);margin:0 auto}
    .btn{width:100%;padding:18px;border:0;border-radius:999px;font-weight:900;font-size:18px;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--purple2),var(--purple4));box-shadow:0 20px 55px rgba(139,92,246,.25)}
    .btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="link" href="phone.html">رجوع</a>
    <div class="brand">MEEM TV</div>
    <button class="link" onclick="alert('تسجيل الدخول لاحقاً')">دخول</button>
  </div>

  <div class="page">
    <div class="step">الخطوة 1 من 3</div>
    <div class="title">أدخل كود SMS</div>
    <div class="desc">أرسلنا لك كود من 4 أرقام على رقمك.</div>

    <div class="otp" dir="ltr">
      <input maxlength="1" class="d" />
      <input maxlength="1" class="d" />
      <input maxlength="1" class="d" />
      <input maxlength="1" class="d" />
    </div>

    <div class="timer" id="timerText">إعادة إرسال الكود خلال: <span id="timer">60</span>s</div>
  </div>

  <div class="footer-sticky">
    <div class="inner">
      <button id="next" class="btn" disabled>متابعة</button>
    </div>
  </div>

  <script>
    const inputs = Array.from(document.querySelectorAll('.d'));
    const next = document.getElementById('next');

    inputs.forEach((inp, idx) => {
      inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/[^\d]/g,'').slice(0,1);
        if(inp.value && idx < inputs.length-1) inputs[idx+1].focus();
        check();
      });
      inp.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace' && !inp.value && idx > 0) inputs[idx-1].focus();
      });
    });

    function check(){
      const code = inputs.map(i=>i.value).join('');
      next.disabled = code.length !== 4;
    }

    next.addEventListener('click', () => {
      window.location.href = 'plan.html';
    });

    // timer
    let t = 60;
    const timerEl = document.getElementById('timer');
    const timerText = document.getElementById('timerText');
    const intv = setInterval(() => {
      t--;
      timerEl.textContent = t;
      if(t<=0){
        clearInterval(intv);
        timerText.innerHTML = 'لم يصلك الكود؟ <button style="border:0;background:transparent;color:#6D28D9;font-weight:900;cursor:pointer" onclick="location.reload()">إعادة إرسال</button>';
      }
    }, 1000);

    setTimeout(()=>inputs[0].focus(), 50);
  </script>
</body>
</html>
